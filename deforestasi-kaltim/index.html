<div id="app"></div>
<style>
  #app {
    --bg: #10231b;
    --bg-panel: #17321f;
    --line: #2c4a36;
    --text: #eee7d8;
    --text-dim: #9db3a2;
    --gold: #c9a227;
    --green: #4c9a6a;
    --clay: #c1440e;
    --font-display: 'Fraunces', 'Georgia', serif;
    --font-body: 'IBM Plex Sans', 'Segoe UI', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;

    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    border-radius: 14px;
    padding: 28px 30px 20px;
    box-sizing: border-box;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  #app::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 85% -10%, rgba(76,154,106,0.18), transparent 60%),
      radial-gradient(ellipse 50% 30% at -10% 110%, rgba(193,68,14,0.10), transparent 60%);
    pointer-events: none;
  }

  .header { position: relative; z-index: 1; margin-bottom: 4px; }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 8px;
  }
  h1.title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 28px;
    line-height: 1.15;
    margin: 0 0 6px;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0 0 20px;
    max-width: 60ch;
  }

  .legend {
    display: flex;
    gap: 18px;
    font-size: 11.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  .chart-wrap { position: relative; z-index: 1; }
  svg { display: block; width: 100%; height: auto; overflow: visible; }

  .bar { cursor: pointer; transition: opacity 0.15s ease, filter 0.15s ease; }
  .bar:hover { filter: brightness(1.18); }
  .bar.dimmed { opacity: 0.35; }

  .gridline { stroke: var(--line); stroke-width: 1; }
  .axis-label { fill: var(--text-dim); font-family: var(--font-mono); font-size: 10.5px; }
  .year-label { fill: var(--text-dim); font-family: var(--font-mono); font-size: 11px; }
  .year-label.active { fill: var(--gold); font-weight: 600; }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #0c1a13;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 12px;
    color: var(--text);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transform: translate(-50%, -110%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s ease;
    z-index: 10;
    font-family: var(--font-mono);
  }
  .tooltip b { color: var(--gold); }

  .detail-panel {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.25s ease, max-height 0.25s ease, padding 0.25s ease, margin 0.25s ease;
  }
  .detail-panel.open {
    opacity: 1;
    max-height: 120px;
    margin-top: 18px;
  }
  .detail-panel.empty {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
    padding-top: 0;
    padding-bottom: 0;
    border-width: 0;
  }
  .detail-left { display: flex; flex-direction: column; gap: 2px; }
  .detail-year {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
  }
  .detail-sub { font-size: 11.5px; color: var(--text-dim); font-family: var(--font-mono); }
  .detail-value {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--gold);
    text-align: right;
  }
  .detail-value small {
    display: block;
    font-size: 10.5px;
    font-weight: 400;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .detail-close {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .detail-close:hover { color: var(--text); border-color: var(--gold); }

  .footer {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  @media (max-width: 560px) {
    h1.title { font-size: 22px; }
    .legend { flex-wrap: wrap; row-gap: 6px; }
  }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script>
(function() {
  // Data langsung dari CSV yang diunggah (baris "Total" tidak disertakan)
  const data = [
    { tahun: 2015, ha: 45235.24 },
    { tahun: 2016, ha: 53974.48 },
    { tahun: 2017, ha: 27449.38 },
    { tahun: 2018, ha: 44365.94 },
    { tahun: 2019, ha: 34227.90 },
    { tahun: 2020, ha: 16286.35 },
    { tahun: 2021, ha: 13160.76 },
    { tahun: 2022, ha: 12352.59 },
    { tahun: 2023, ha: 28116.97 },
    { tahun: 2024, ha: 40281.96 },
    { tahun: 2025, ha: 46592.06 },
  ];

  const fmtID = (n, decimals) => n.toLocaleString('id-ID', {
    minimumFractionDigits: decimals === undefined ? 0 : decimals,
    maximumFractionDigits: decimals === undefined ? 0 : decimals,
  });

  const app = document.getElementById('app');

  const min = Math.min(...data.map(d => d.ha));
  const max = Math.max(...data.map(d => d.ha));

  // Skala warna: hijau (rendah) -> emas (menengah) -> merah bata (tinggi)
  // Warna tiap batang berbeda dan berarti: menunjukkan tingkat keparahan deforestasi tahun itu.
  function colorFor(value) {
    const t = (value - min) / (max - min || 1);
    const stops = [
      [76, 154, 106],   // hijau
      [201, 162, 39],   // emas
      [193, 68, 14],    // merah bata
    ];
    const seg = t < 0.5 ? 0 : 1;
    const localT = t < 0.5 ? t / 0.5 : (t - 0.5) / 0.5;
    const a = stops[seg], b = stops[seg + 1];
    const r = Math.round(a[0] + (b[0] - a[0]) * localT);
    const g = Math.round(a[1] + (b[1] - a[1]) * localT);
    const bch = Math.round(a[2] + (b[2] - a[2]) * localT);
    return `rgb(${r},${g},${bch})`;
  }

  // --- Layout SVG ---
  const W = 820, H = 380;
  const marginL = 62, marginR = 16, marginT = 16, marginB = 40;
  const plotW = W - marginL - marginR;
  const plotH = H - marginT - marginB;
  const barGap = 14;
  const barW = (plotW - barGap * (data.length - 1)) / data.length;

  const niceMax = Math.ceil(max / 10000) * 10000;
  const yTicks = 5;

  function yFor(v) { return marginT + plotH - (v / niceMax) * plotH; }

  let gridSvg = '';
  let axisLabels = '';
  for (let i = 0; i <= yTicks; i++) {
    const v = (niceMax / yTicks) * i;
    const y = yFor(v);
    gridSvg += `<line class="gridline" x1="${marginL}" x2="${W - marginR}" y1="${y}" y2="${y}" />`;
    axisLabels += `<text class="axis-label" x="${marginL - 10}" y="${y + 4}" text-anchor="end">${fmtID(v)}</text>`;
  }

  let bars = '';
  let yearLabels = '';
  data.forEach((d, i) => {
    const x = marginL + i * (barW + barGap);
    const y = yFor(d.ha);
    const h = plotH + marginT - y;
    const color = colorFor(d.ha);
    bars += `<rect class="bar" data-idx="${i}" x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${barW.toFixed(2)}" height="${h.toFixed(2)}" rx="4" fill="${color}"></rect>`;
    yearLabels += `<text class="year-label" data-year-idx="${i}" x="${(x + barW / 2).toFixed(2)}" y="${H - marginB + 20}" text-anchor="middle">${d.tahun}</text>`;
  });

  app.innerHTML = `
    <div class="header">
      <p class="eyebrow">Kalimantan Timur &middot; 2015&ndash;2025</p>
      <h1 class="title">Deforestasi Kalimantan Timur 2015–2025</h1>
      <p class="subtitle">Luas tutupan hutan yang hilang tiap tahun, dalam hektare. Warna batang mengikuti tingkat keparahan &mdash; hijau paling rendah, merah bata paling tinggi.</p>
    </div>
    <div class="legend">
      <span><i style="background:rgb(76,154,106)"></i>Rendah</span>
      <span><i style="background:rgb(201,162,39)"></i>Menengah</span>
      <span><i style="background:rgb(193,68,14)"></i>Tinggi</span>
    </div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        ${gridSvg}
        ${axisLabels}
        ${bars}
        ${yearLabels}
      </svg>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="detail-panel empty" id="detailPanel">
      <div class="detail-left">
        <div class="detail-year" id="detailYear"></div>
        <div class="detail-sub">Deforestasi tahun terpilih</div>
      </div>
      <div class="detail-value" id="detailValue"></div>
      <button class="detail-close" id="detailClose" title="Tutup">&times;</button>
    </div>
    <div class="footer">
      <span>Sumber data: Auriga</span>
      <span>Klik batang untuk detail</span>
    </div>
  `;

  const tooltip = app.querySelector('#tooltip');
  const detailPanel = app.querySelector('#detailPanel');
  const detailYear = app.querySelector('#detailYear');
  const detailValue = app.querySelector('#detailValue');
  const detailClose = app.querySelector('#detailClose');
  const svg = app.querySelector('svg');
  const barEls = app.querySelectorAll('.bar');
  const yearLabelEls = app.querySelectorAll('.year-label');

  let selectedIdx = null;

  function showDetail(idx) {
    const d = data[idx];
    selectedIdx = idx;
    detailYear.textContent = `Tahun: ${d.tahun}`;
    detailValue.innerHTML = `${fmtID(d.ha, 2)} ha<small>Deforestasi: ${fmtID(d.ha, 2)} hektare</small>`;
    detailPanel.classList.add('open');
    detailPanel.classList.remove('empty');
    barEls.forEach(b => b.classList.toggle('dimmed', Number(b.dataset.idx) !== idx));
    yearLabelEls.forEach(l => l.classList.toggle('active', Number(l.dataset.yearIdx) === idx));
  }

  function closeDetail() {
    selectedIdx = null;
    detailPanel.classList.remove('open');
    detailPanel.classList.add('empty');
    barEls.forEach(b => b.classList.remove('dimmed'));
    yearLabelEls.forEach(l => l.classList.remove('active'));
  }

  barEls.forEach(bar => {
    const idx = Number(bar.dataset.idx);
    const d = data[idx];

    bar.addEventListener('click', () => {
      if (selectedIdx === idx) { closeDetail(); } else { showDetail(idx); }
    });

    bar.addEventListener('mousemove', (e) => {
      const rect = svg.getBoundingClientRect();
      const wrapRect = bar.closest('.chart-wrap').getBoundingClientRect();
      const x = e.clientX - wrapRect.left;
      const y = e.clientY - wrapRect.top;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
      tooltip.style.opacity = '1';
      tooltip.innerHTML = `<b>${d.tahun}</b> &middot; ${fmtID(d.ha, 2)} ha`;
    });

    bar.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  });

  detailClose.addEventListener('click', closeDetail);
})();
</script>
